<!DOCTYPE html>
<html xmlns:th="http://www.thymeleaf.org">
<head>
  <title>Event Detail</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css"
        rel="stylesheet">
</head>

<body>

<div th:replace="fragments/navbar :: navbar"></div>

<div class="container mt-4">

  <h2 th:text="${event.name}"></h2>

  <p><strong>Club:</strong>
    <span th:text="${club.name}"></span>
  </p>

  <p><strong>Date:</strong>
    <span th:text="${event.date}"></span>
  </p>

  <p><strong>Type:</strong>
    <span class="badge bg-secondary"
          th:text="${event.type}">
        </span>
  </p>

  <p><strong>Location:</strong>
    <span th:text="${event.location}"></span>
  </p>

  <p><strong>Description:</strong></p>
  <p th:text="${event.description}"></p>

  <!-- ACTIONS -->
  <div class="mt-3">

    <a th:href="@{/events/{id}/edit(id=${event.id})}"
       class="btn btn-primary">
      Edit
    </a>

    <a th:href="@{/events/{id}/delete(id=${event.id})}"
       class="btn btn-danger">
      Delete
    </a>

  </div>

</div>

</body>
</html>
